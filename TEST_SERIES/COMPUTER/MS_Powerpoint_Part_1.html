<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MS Powerpoint (PART 1)</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        margin: 0;
        padding-bottom: 90px;
      }
      .container {
        max-width: 800px;
        margin: auto;
        padding: 12px;
      }
      .card {
        background: #fff;
        padding: 12px;
        border-radius: 10px;
        margin-top: 12px;
      }
      .qtext {
        font-size: 16px;
        margin: 10px 0;
      }
      .opt {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        margin: 6px 0;
        cursor: pointer;
      }
      .opt.selected {
        border-color: #2ec4b6;
      }
      .opt.correct {
        background: #d4edda;
        border-color: #28a745;
      }
      .opt.wrong {
        background: #f8d7da;
        border-color: #dc3545;
      }
      button {
        padding: 8px 12px;
        margin: 5px;
        border: none;
        border-radius: 6px;
        background: #2ec4b6;
        color: white;
        cursor: pointer;
      }
      #result {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div id="qnum"></div>
        <div id="qtext" class="qtext"></div>
        <div id="options"></div>
      </div>

      <div class="card">
        <button onclick="prev()">Prev</button>
        <button onclick="next()">Next</button>
        <button onclick="submitQuiz()">Submit</button>
      </div>

      <div id="result" class="card"></div>
    </div>

    <script>
      const questions = [
        // Microsoft Word
      ];

      let i = 0,
        score = 0,
        selected = [];

      function loadQ() {
        document.getElementById("qnum").innerText =
          "Question " + (i + 1) + "/" + questions.length;
        document.getElementById("qtext").innerText = questions[i].q;
        let ops = "";
        questions[i].options.forEach((o, idx) => {
          ops += `<div class="opt" onclick="select(${idx})">${o}</div>`;
        });
        document.getElementById("options").innerHTML = ops;
      }

      function select(idx) {
        selected[i] = idx;
        let opts = document.querySelectorAll(".opt");
        opts.forEach((o) => o.classList.remove("selected"));
        opts[idx].classList.add("selected");
      }

      function next() {
        if (i < questions.length - 1) {
          i++;
          loadQ();
        }
      }
      function prev() {
        if (i > 0) {
          i--;
          loadQ();
        }
      }

      function submitQuiz() {
        score = 0;
        let res = "";
        questions.forEach((q, idx) => {
          if (selected[idx] == q.answer) {
            score++;
            res += `<p>Q${idx + 1}: Correct</p>`;
          } else {
            res += `<p>Q${idx + 1}: Wrong - ${q.exp}</p>`;
          }
        });
        document.getElementById("result").style.display = "block";
        document.getElementById("result").innerHTML =
          "<h3>Score: " + score + "/" + questions.length + "</h3>" + res;
      }

      loadQ();
    </script>
  </body>
</html>
