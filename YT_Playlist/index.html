<!doctype html>
<html lang="hi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chapterwise Tests</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 900px;
        margin: auto;
      }

      .header {
        text-align: center;
        color: white;
        margin-bottom: 25px;
      }

      .header h1 {
        font-size: 2rem;
        margin-bottom: 8px;
      }

      .header p {
        opacity: 0.9;
      }

      .table-box {
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead {
        background: linear-gradient(90deg, #ff6b6b, #ff9f43);
        color: white;
      }

      th {
        padding: 18px;
        text-align: center;
        font-size: 18px;
      }

      td {
        padding: 15px;
        text-align: center;
        border-bottom: 1px solid #eee;
      }

      tr:hover {
        background: #8a9af8;
      }

      .test-btn {
        display: inline-block;
        padding: 10px 18px;
        text-decoration: none;
        color: white;
        border-radius: 10px;
        font-weight: bold;
        transition: 0.3s;
      }

      .btn1 {
        background: #4f46e5;
      }

      .btn2 {
        background: #10b981;
      }

      .test-btn:hover {
        transform: scale(1.05);
      }

      .back-btn {
        display: inline-block;
        margin-top: 20px;
        background: white;
        color: #333;
        text-decoration: none;
        padding: 12px 20px;
        border-radius: 10px;
        font-weight: bold;
      }

      .footer {
        text-align: center;
        color: white;
        margin-top: 20px;
      }

      @media (max-width: 600px) {
        .header h1 {
          font-size: 1.6rem;
        }

        th,
        td {
          padding: 12px 8px;
          font-size: 14px;
        }

        .test-btn {
          padding: 8px 12px;
          font-size: 13px;
        }
      }
    </style>
  </head>
