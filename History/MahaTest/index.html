<!doctype html>
<html lang="hi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chapterwise Tests</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 900px;
        margin: auto;
      }

      .header {
        text-align: center;
        color: white;
        margin-bottom: 25px;
      }

      .header h1 {
        font-size: 2rem;
        margin-bottom: 8px;
      }

      .header p {
        opacity: 0.9;
      }

      .table-box {
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead {
        background: linear-gradient(90deg, #ff6b6b, #ff9f43);
        color: white;
      }

      th {
        padding: 18px;
        text-align: center;
        font-size: 18px;
      }

      td {
        padding: 15px;
        text-align: center;
        border-bottom: 1px solid #eee;
      }

      tr:hover {
        background: #f8f9ff;
      }

      .test-btn {
        display: inline-block;
        padding: 10px 18px;
        text-decoration: none;
        color: white;
        border-radius: 10px;
        font-weight: bold;
        transition: 0.3s;
      }

      .btn1 {
        background: #4f46e5;
      }

      .btn2 {
        background: #10b981;
      }

      .test-btn:hover {
        transform: scale(1.05);
      }

      .back-btn {
        display: inline-block;
        margin-top: 20px;
        background: white;
        color: #333;
        text-decoration: none;
        padding: 12px 20px;
        border-radius: 10px;
        font-weight: bold;
      }

      .footer {
        text-align: center;
        color: white;
        margin-top: 20px;
      }

      @media (max-width: 600px) {
        .header h1 {
          font-size: 1.6rem;
        }

        th,
        td {
          padding: 12px 8px;
          font-size: 14px;
        }

        .test-btn {
          padding: 8px 12px;
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>📝 Chapterwise Tests</h1>
        <p>Practice Tests for Better Preparation</p>
      </div>

      <div class="table-box">
        <table>
          <thead>
            <tr>
              <th>Test No.</th>
              <th>Action</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td>📘 Gandhian Era Topic 1-4</td>
              <td>
                <a
                  href="/History/MahaTest/Gandhian Era Topic 1-4.html"
                  class="test-btn btn1"
                >
                  Start Test
                </a>
              </td>
            </tr>

            <tr>
              <td>📗 Gandhian Era Topic 5-last</td>
              <td>
                <a
                  href="/History/MahaTest/Gandhian Era Topic 5-last - Copy (1).html"
                  class="test-btn btn2"
                >
                  Start Test
                </a>
              </td>
            </tr>
            <tr>
              <td>📘 MODERN HISTORY GANDHIAN ERA 22-01-2026 QUIZ</td>
              <td>
                <a
                  href="/History/MahaTest/GK MODERN HISTORY GANDHIAN ERA 22-01-2026 QUIZ_quiz_789.html"
                  class="test-btn btn1"
                >
                  Start Test
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <a href="index.html" class="back-btn">⬅ Back to Home</a>

      <div class="footer">© 2026 My Notes</div>
    </div>
  </body>
</html>
