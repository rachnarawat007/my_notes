<!doctype html>
<html lang="hi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Notes</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #f8fafc, #e2e8f0);
        min-height: 100vh;
        padding: 20px;
      }

      .header {
        text-align: center;
        margin-bottom: 30px;
      }

      .header h1 {
        font-size: 2.2rem;
        color: #1e293b;
        margin-bottom: 10px;
      }

      .header p {
        color: #64748b;
      }

      .container {
        max-width: 1200px;
        margin: auto;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
      }

      .card {
        background: #fff;
        border-radius: 20px;
        padding: 25px;
        text-decoration: none;
        color: #111827;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        transition: 0.3s;
        border: 1px solid #e5e7eb;
      }

      .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
      }

      .icon {
        font-size: 45px;
        margin-bottom: 15px;
      }

      .card h2 {
        margin-bottom: 10px;
        font-size: 1.3rem;
        color: #0f172a;
      }

      .card p {
        color: #64748b;
        line-height: 1.5;
      }

      .btn {
        display: inline-block;
        margin-top: 15px;
        padding: 10px 18px;
        background: #2563eb;
        color: white;
        border-radius: 10px;
        font-size: 14px;
      }

      .footer {
        text-align: center;
        margin-top: 40px;
        color: #64748b;
      }

      /* Mobile */
      @media (max-width: 600px) {
        .header h1 {
          font-size: 1.8rem;
        }

        .card {
          padding: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>📚 My Notes</h1>
        <p>History Notes, Ghatna Chakra & Chapterwise Tests</p>
      </div>

      <div class="cards">
        <a href="/History/Ancient History/" class="card">
          <div class="icon">🏺</div>
          <h2>Ancient History</h2>

          <span class="btn">Open Notes →</span>
        </a>

        <a href="/History/Medieval History/" class="card">
          <div class="icon">🏰</div>
          <h2>Medieval History</h2>

          <span class="btn">Open Notes →</span>
        </a>

        <a href="/History/Modern History/" class="card">
          <div class="icon">🇮🇳</div>
          <h2>Modern History</h2>

          <span class="btn">Open Notes →</span>
        </a>

        <a href="/History/GhatnaChakra/" class="card">
          <div class="icon">📖</div>
          <h2>Ghatna Chakra Book</h2>

          <span class="btn">Read Book →</span>
        </a>

        <a href="/History/MahaTest/" class="card">
          <div class="icon">📝</div>
          <h2>Chapterwise Test</h2>

          <span class="btn">Start Test →</span>
        </a>
      </div>

      <div class="footer">
        <p>© 2026 My Notes | Made for Study</p>
      </div>
    </div>
  </body>
</html>
